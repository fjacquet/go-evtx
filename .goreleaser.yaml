version: 2

project_name: go-evtx

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  # go-evtx is a library — no binary to build.
  # GoReleaser creates the GitHub release with changelog; consumers use go get.
  - skip: true

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: fjacquet
    name: go-evtx
  draft: false
  prerelease: auto
  name_template: '{{ .Tag }}'
  header: |
    See [CHANGELOG.md](https://github.com/fjacquet/go-evtx/blob/main/CHANGELOG.md) for full details.
  footer: |
    **Full Changelog**: https://github.com/fjacquet/go-evtx/compare/{{ .PreviousTag }}...{{ .Tag }}
